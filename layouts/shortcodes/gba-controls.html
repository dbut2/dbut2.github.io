{{ $target := .Get "target" }}
{{ $id := .Get "id" | default (replace $target "/" "-" | replaceRE "[^a-zA-Z0-9-]" "") }}
{{ $width := .Get "width" | default "720" }}
<div id="{{ $id }}-controls" class="gba-controls" style="text-align:center;">
    <button id="{{ $id }}-lock-btn">&#x26F6; Fullscreen</button>
    <div class="gba-controls-bumpers">
        <button data-key="KeyA" data-label="L"></button>
        <button data-key="KeyS" data-label="R"></button>
    </div>
    <div class="gba-controls-main">
        <div class="gba-dpad">
            <button data-key="ArrowUp" data-label="&#x2191;" class="gba-dpad-up"></button>
            <button data-key="ArrowLeft" data-label="&#x2190;" class="gba-dpad-left"></button>
            <button data-key="ArrowRight" data-label="&#x2192;" class="gba-dpad-right"></button>
            <button data-key="ArrowDown" data-label="&#x2193;" class="gba-dpad-down"></button>
        </div>
        <div class="gba-ab">
            <button data-key="KeyX" data-label="B" class="gba-btn-round"></button>
            <button data-key="KeyZ" data-label="A" class="gba-btn-round"></button>
        </div>
    </div>
    <div class="gba-menu">
        <button data-key="Backspace" data-label="SELECT" class="gba-btn-small"></button>
        <button data-key="Enter" data-label="START" class="gba-btn-small"></button>
    </div>
</div>

<style>
    .gba-controls {
        display: none;
    }
    @media (pointer: coarse) {
        .keyboard-controls-hint {
            display: none;
        }
        .gba-controls {
            display: block;
            max-width: {{ $width }}px;
            margin: 16px auto 0;
            padding: 12px 8px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
    }
    .gba-controls button::after {
        content: attr(data-label);
    }
    .gba-controls button {
        background: #2a2a2a;
        color: #ccc;
        border: 1px solid #444;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .gba-controls button:active {
        background: #555;
    }
    .gba-controls-bumpers {
        display: flex;
        justify-content: space-between;
        margin-bottom: 18px;
        padding: 0 8px;
    }
    .gba-controls-bumpers button {
        width: 72px;
        height: 36px;
    }
    .gba-controls-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .gba-dpad {
        display: grid;
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px 50px;
        gap: 3px;
    }
    .gba-dpad-up    { grid-column: 2; grid-row: 1; }
    .gba-dpad-left  { grid-column: 1; grid-row: 2; }
    .gba-dpad-right { grid-column: 3; grid-row: 2; }
    .gba-dpad-down  { grid-column: 2; grid-row: 3; }
    .gba-dpad button {
        width: 50px;
        height: 50px;
        font-size: 20px;
        border-radius: 8px;
    }
    .gba-menu {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 14px;
    }
    .gba-btn-small {
        width: 56px;
        height: 28px;
        font-size: 10px !important;
        border-radius: 12px !important;
    }
    .gba-ab {
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .gba-btn-round {
        width: 54px;
        height: 54px;
        border-radius: 50% !important;
        font-size: 16px !important;
    }

    /* Lock button — mobile only */
    #{{ $id }}-lock-btn {
        display: none;
    }
    @media (pointer: coarse) {
        #{{ $id }}-lock-btn {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            background: #1a1a2e;
            color: #aac;
            border: 1px solid #446;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    }

    /* Fullscreen overlay (injected by JS) */
    #gba-fullscreen-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        overflow: hidden;
        touch-action: none;
    }

    #gba-fullscreen-top-bar {
        width: 100%;
        display: flex;
        justify-content: flex-end;
        padding: 8px;
        flex-shrink: 0;
    }

    #gba-fullscreen-unlock-btn {
        background: #1a1a2e;
        color: #aac;
        border: 1px solid #446;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 14px;
        font-family: monospace;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }

    #gba-fullscreen-canvas-wrapper {
        flex: 1;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        min-height: 0;
    }

    #gba-fullscreen-canvas-wrapper canvas {
        max-width: 100%;
        max-height: 100%;
        width: auto !important;
        height: auto !important;
        image-rendering: pixelated;
    }

    #gba-fullscreen-overlay .gba-controls {
        display: block !important;
        margin: 0 auto;
        padding: 8px;
        flex-shrink: 0;
    }
</style>

<script>
    (function() {
        var controlsEl = document.getElementById("{{ $id }}-controls");
        controlsEl.querySelectorAll("button[data-key]").forEach(function(btn) {
            var code = btn.getAttribute("data-key");
            btn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keydown", { code: code, bubbles: true }));
            }, { passive: false });
            btn.addEventListener("touchend", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keyup", { code: code, bubbles: true }));
            }, { passive: false });
            btn.addEventListener("touchcancel", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keyup", { code: code, bubbles: true }));
            }, { passive: false });
        });
    })();

    (function() {
        var canvasId  = "{{ $id }}";
        var canvas    = document.getElementById(canvasId);
        var controls  = document.getElementById("{{ $id }}-controls");
        var lockBtn   = document.getElementById("{{ $id }}-lock-btn");

        if (!canvas || !controls || !lockBtn) return;

        var canvasParent        = canvas.parentNode;
        var canvasNextSibling   = canvas.nextSibling;
        var controlsParent      = controls.parentNode;
        var controlsNextSibling = controls.nextSibling;
        var savedScrollY        = 0;

        var viewportMeta     = document.querySelector('meta[name="viewport"]');
        var originalViewport = viewportMeta ? viewportMeta.content : null;

        var overlay = document.createElement('div');
        overlay.id  = 'gba-fullscreen-overlay';

        var topBar = document.createElement('div');
        topBar.id  = 'gba-fullscreen-top-bar';

        var unlockBtn = document.createElement('button');
        unlockBtn.id  = 'gba-fullscreen-unlock-btn';
        unlockBtn.textContent = '✕ Unlock';
        topBar.appendChild(unlockBtn);

        var canvasWrapper = document.createElement('div');
        canvasWrapper.id  = 'gba-fullscreen-canvas-wrapper';

        overlay.appendChild(topBar);
        overlay.appendChild(canvasWrapper);

        function lock() {
            savedScrollY = window.scrollY;

            canvasWrapper.appendChild(canvas);
            overlay.appendChild(controls);
            document.body.appendChild(overlay);

            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width    = '100%';
            document.body.style.top      = '-' + savedScrollY + 'px';

            if (viewportMeta) {
                viewportMeta.content =
                    'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no';
            }

            var fs = overlay.requestFullscreen || overlay.webkitRequestFullscreen;
            if (fs) fs.call(overlay).catch(function(){});
        }

        function unlock() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
                if (exitFs) exitFs.call(document).catch(function(){});
            }

            canvasParent.insertBefore(canvas, canvasNextSibling);
            controlsParent.insertBefore(controls, controlsNextSibling);

            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);

            document.body.style.overflow = '';
            document.body.style.position = '';
            document.body.style.width    = '';
            document.body.style.top      = '';
            window.scrollTo(0, savedScrollY);

            if (viewportMeta && originalViewport) {
                viewportMeta.content = originalViewport;
            }
        }

        lockBtn.addEventListener('click', lock, { passive: false });
        unlockBtn.addEventListener('click', unlock, { passive: false });

        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && overlay.parentNode) unlock();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.parentNode) unlock();
        });
    })();
</script>

{{ $target := .Get "target" }}
{{ $id := .Get "id" | default (replace $target "/" "-" | replaceRE "[^a-zA-Z0-9-]" "") }}
{{ $width := .Get "width" | default "720" }}
<div id="{{ $id }}-controls" class="gba-controls" style="text-align:center;">
    <div class="gba-controls-bumpers">
        <button data-key="KeyA" data-label="L"></button>
        <button data-key="KeyS" data-label="R"></button>
    </div>
    <div class="gba-controls-main">
        <div class="gba-dpad">
            <button data-key="ArrowUp" data-label="&#x2191;" class="gba-dpad-up"></button>
            <button data-key="ArrowLeft" data-label="&#x2190;" class="gba-dpad-left"></button>
            <button data-key="ArrowRight" data-label="&#x2192;" class="gba-dpad-right"></button>
            <button data-key="ArrowDown" data-label="&#x2193;" class="gba-dpad-down"></button>
        </div>
        <div class="gba-ab">
            <button data-key="KeyX" data-label="B" class="gba-btn-round"></button>
            <button data-key="KeyZ" data-label="A" class="gba-btn-round"></button>
        </div>
    </div>
    <div class="gba-menu">
        <button data-key="Backspace" data-label="SELECT" class="gba-btn-small"></button>
        <button data-key="Enter" data-label="START" class="gba-btn-small"></button>
    </div>
</div>

<style>
    .gba-controls {
        display: none;
    }
    @media (pointer: coarse) {
        .keyboard-controls-hint {
            display: none;
        }
        .gba-controls {
            display: block;
            max-width: {{ $width }}px;
            margin: 16px auto 0;
            padding: 12px 8px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
    }
    .gba-controls button::after {
        content: attr(data-label);
    }
    .gba-controls button {
        background: #2a2a2a;
        color: #ccc;
        border: 1px solid #444;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .gba-controls button:active {
        background: #555;
    }
    .gba-controls-bumpers {
        display: flex;
        justify-content: space-between;
        margin-bottom: 18px;
        padding: 0 8px;
    }
    .gba-controls-bumpers button {
        width: 72px;
        height: 36px;
    }
    .gba-controls-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .gba-dpad {
        display: grid;
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px 50px;
        gap: 3px;
    }
    .gba-dpad-up    { grid-column: 2; grid-row: 1; }
    .gba-dpad-left  { grid-column: 1; grid-row: 2; }
    .gba-dpad-right { grid-column: 3; grid-row: 2; }
    .gba-dpad-down  { grid-column: 2; grid-row: 3; }
    .gba-dpad button {
        width: 50px;
        height: 50px;
        font-size: 20px;
        border-radius: 8px;
    }
    .gba-menu {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 14px;
    }
    .gba-btn-small {
        width: 56px;
        height: 28px;
        font-size: 10px !important;
        border-radius: 12px !important;
    }
    .gba-ab {
        display: flex;
        gap: 12px;
        align-items: center;
    }
    .gba-btn-round {
        width: 54px;
        height: 54px;
        border-radius: 50% !important;
        font-size: 16px !important;
    }

    /* Canvas container (JS-created wrapper for canvas + toggle btn) */
    .gba-canvas-container {
        position: relative;
        display: block;
        width: 100%;
        line-height: 0; /* no gap below canvas */
    }

    /* Toggle button — corner overlay on canvas, mobile only */
    #gba-toggle-btn {
        display: none;
    }
    @media (pointer: coarse) {
        #gba-toggle-btn {
            display: block;
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            width: 36px;
            height: 36px;
            padding: 0;
            font-size: 16px;
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            opacity: 0.75;
        }
        #gba-toggle-btn:active {
            background: #555;
            opacity: 1;
        }
    }

    /* Fullscreen overlay (injected by JS) */
    #gba-fullscreen-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        overflow: hidden;
        touch-action: none;
    }

    #gba-fullscreen-overlay .gba-canvas-container canvas {
        display: block;
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
        image-rendering: pixelated;
    }

    #gba-fullscreen-overlay .gba-controls {
        display: block !important;
        width: 100%;
        max-width: none;
        margin: 0;
        padding: 8px;
        flex-shrink: 0;
    }
</style>

<script>
    (function() {
        var controlsEl = document.getElementById("{{ $id }}-controls");
        controlsEl.querySelectorAll("button[data-key]").forEach(function(btn) {
            var code = btn.getAttribute("data-key");
            btn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keydown", { code: code, bubbles: true }));
            }, { passive: false });
            btn.addEventListener("touchend", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keyup", { code: code, bubbles: true }));
            }, { passive: false });
            btn.addEventListener("touchcancel", function(e) {
                e.preventDefault();
                document.dispatchEvent(new KeyboardEvent("keyup", { code: code, bubbles: true }));
            }, { passive: false });
        });
    })();

    (function() {
        var canvas   = document.getElementById("{{ $id }}");
        var controls = document.getElementById("{{ $id }}-controls");

        if (!canvas || !controls) return;
        if (!window.matchMedia('(pointer: coarse)').matches) return;

        // Wrap canvas in a container so we can position the toggle button over it
        var canvasContainer = document.createElement('div');
        canvasContainer.className = 'gba-canvas-container';
        canvas.parentNode.insertBefore(canvasContainer, canvas);
        canvasContainer.appendChild(canvas);

        // Toggle button — corner overlay on the canvas
        var toggleBtn = document.createElement('button');
        toggleBtn.id  = 'gba-toggle-btn';
        toggleBtn.textContent = '⛶';
        canvasContainer.appendChild(toggleBtn);

        var containerParent      = canvasContainer.parentNode;
        var containerNextSibling = canvasContainer.nextSibling;
        var controlsParent       = controls.parentNode;
        var controlsNextSibling  = controls.nextSibling;
        var savedScrollY         = 0;
        var locked               = false;
        var savedCanvasMaxWidth  = canvas.style.maxWidth;

        var viewportMeta     = document.querySelector('meta[name="viewport"]');
        var originalViewport = viewportMeta ? viewportMeta.content : null;

        var overlay = document.createElement('div');
        overlay.id  = 'gba-fullscreen-overlay';

        function lock() {
            savedScrollY = window.scrollY;
            locked = true;

            overlay.appendChild(canvasContainer);
            overlay.appendChild(controls);
            document.body.appendChild(overlay);

            // Override the wasm shortcode's max-width so canvas fills full width
            canvas.style.maxWidth = '100%';

            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width    = '100%';
            document.body.style.top      = '-' + savedScrollY + 'px';

            if (viewportMeta) {
                viewportMeta.content =
                    'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no';
            }

            var fs = overlay.requestFullscreen || overlay.webkitRequestFullscreen;
            if (fs) fs.call(overlay).catch(function(){});
        }

        function unlock() {
            locked = false;

            if (document.fullscreenElement || document.webkitFullscreenElement) {
                var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
                if (exitFs) exitFs.call(document).catch(function(){});
            }

            containerParent.insertBefore(canvasContainer, containerNextSibling);
            controlsParent.insertBefore(controls, controlsNextSibling);

            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);

            canvas.style.maxWidth = savedCanvasMaxWidth;

            document.body.style.overflow = '';
            document.body.style.position = '';
            document.body.style.width    = '';
            document.body.style.top      = '';
            window.scrollTo(0, savedScrollY);

            if (viewportMeta && originalViewport) {
                viewportMeta.content = originalViewport;
            }
        }

        toggleBtn.addEventListener('click', function() {
            if (locked) unlock(); else lock();
        }, { passive: false });

        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement && locked) unlock();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && locked) unlock();
        });
    })();
</script>

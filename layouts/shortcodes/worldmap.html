<style>
  #globe-container {
    width: 100vw;
    margin-left: calc(50% - 50vw);
    height: 75vh;
    position: relative;
    background: #050a0e;
    border-radius: var(--radius, 4px);
    overflow: hidden;
  }
  #globe-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(20,60,140,0.13) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  #travel-globe {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }
  .city-label {
    display: flex;
    flex-direction: column;
    padding-left: 7px;
    border-left: 1px solid rgba(79,158,255,0.35);
    pointer-events: none;
    user-select: none;
  }
  .city-label .name {
    color: #e2e8f0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    line-height: 1.35;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(5,10,14,0.9);
  }
  .city-label .year {
    color: #4f9eff;
    font-size: 10px;
    line-height: 1.35;
    text-shadow: 0 0 8px rgba(5,10,14,0.9);
  }
</style>
<div id="globe-container">
  <div id="globe-glow"></div>
  <div id="travel-globe"></div>
</div>
<script src="https://unpkg.com/globe.gl"></script>
<script>
(function () {
  var cities = {{ .Page.Params.cities | jsonify | safeJS }};

  var container = document.getElementById('globe-container');
  var el = document.getElementById('travel-globe');

  var globe = Globe()
    (el)
    .width(container.offsetWidth)
    .height(container.offsetHeight)
    .backgroundColor('#050a0e')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .atmosphereColor('#1d4a8c')
    .atmosphereAltitude(0.15)
    .showGraticules(true)
    .pointsData(cities)
    .pointLat(function (d) { return d.lat; })
    .pointLng(function (d) { return d.lng; })
    .pointColor(function () { return '#4f9eff'; })
    .pointAltitude(0.01)
    .pointRadius(0.4)
    .htmlElementsData(cities)
    .htmlElement(function (d) {
      var div = document.createElement('div');
      div.className = 'city-label';
      div.innerHTML = '<span class="name">' + d.name + '</span><span class="year">' + d.year + '</span>';
      return div;
    })
    .htmlAltitude(0.02)
    .htmlTransitionDuration(0);

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.4;

  var resumeTimer;
  function pauseRotation() {
    globe.controls().autoRotate = false;
    clearTimeout(resumeTimer);
  }
  function scheduleResume() {
    resumeTimer = setTimeout(function () { globe.controls().autoRotate = true; }, 2000);
  }

  el.addEventListener('mousedown', pauseRotation);
  el.addEventListener('mouseup', scheduleResume);
  el.addEventListener('touchstart', pauseRotation, { passive: true });
  el.addEventListener('touchend', scheduleResume, { passive: true });

  window.addEventListener('resize', function () {
    globe.width(container.offsetWidth).height(container.offsetHeight);
  });

  globe.pointOfView({ lat: -10, lng: 140, altitude: 2.2 }, 0);
})();
</script>

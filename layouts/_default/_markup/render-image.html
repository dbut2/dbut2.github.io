{{- $src := .Destination -}}
{{- $alt := .Text -}}
{{- $caption := .Title -}}
{{- $page := .Page -}}

{{- /* Prefer page resources (leaf bundles), fall back to external URL */ -}}
{{- $image := $page.Resources.GetMatch $src -}}

{{- if $image -}}
<figure>
  <img src="{{ $image.RelPermalink }}" alt="{{ $alt }}"{{ with $caption }} title="{{ . }}"{{ end }} loading="lazy">
  {{- with $caption }}
  <figcaption>{{ . }}</figcaption>
  {{- end }}
</figure>
{{- else -}}
<figure>
  <img src="{{ $src | safeURL }}" alt="{{ $alt }}"{{ with $caption }} title="{{ . }}"{{ end }} loading="lazy">
  {{- with $caption }}
  <figcaption>{{ . }}</figcaption>
  {{- end }}
</figure>
{{- end -}}

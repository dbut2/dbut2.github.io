{{ define "main" }}
  {{- $images := .Resources.Match "images/*" -}}

  <header class="dbx-article-head">
    <div class="dbx-article-head__meta">
      <span class="date">{{ .Date.Format "2006-01-02" }}</span>
      &nbsp;·&nbsp;
      <span>{{ len $images }} {{ if eq (len $images) 1 }}frame{{ else }}frames{{ end }}</span>
    </div>
    <h1 class="dbx-article-head__title">{{ .Title }}</h1>
    {{- with .Content }}
    <div class="dbx-article-head__desc">{{ . }}</div>
    {{- end }}
  </header>

  <div class="dbx-photo-gallery">
    {{- range $i, $img := $images }}
      <figure class="dbx-photo-gallery__item">
        <img src="{{ $img.RelPermalink }}" alt="{{ .Title | default (printf "frame %02d" (add $i 1)) }}" loading="lazy">
      </figure>
    {{- end }}
  </div>
{{ end }}

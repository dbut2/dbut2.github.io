{{- $name := .Site.Params.name | default "dylan butler" -}}
{{- $parts := split $name " " -}}
<section class="dbx-hero">
  <h1 class="dbx-hero__name">
    {{- range $i, $part := $parts -}}
      <span class="dbx-hero__line">{{ $part }}{{- if eq $i (sub (len $parts) 1) -}}<span class="dbx-hero__cursor">█</span>{{- end -}}</span>
    {{- end -}}
  </h1>
  <p class="dbx-hero__tag">{{ .Site.Params.description | safeHTML }}</p>
</section>

<div class="bg-white shadow rounded-lg overflow-hidden">
    <img src="{{ .Params.image }}" alt="{{ .Title }}" class="w-full h-48 object-cover">
    <div class="p-6">
        <h2 class="text-xl font-semibold mb-2">{{ .Title }}</h2>
        <p class="text-gray-600 text-sm mb-4">{{ .Date.Format "January 2, 2006" }}
            {{ if .Params.timeToRead }}
            · {{ .Params.timeToRead }} min read
            {{ end }}
        </p>
        <p class="text-gray-700 mb-4">{{ .Summary }}</p>
        <a href="{{ .Permalink }}" class="text-blue-600 hover:text-blue-800 font-semibold">Read more</a>
    </div>
</div>

{{ define "main" }}
<article>
    <header class="mb-8">
        <img src="{{ .Params.image }}" alt="{{ .Title }}" class="w-full h-64 object-cover rounded-lg mb-4">
        <h1 class="text-4xl font-bold mb-2">{{ .Title }}</h1>
        <p class="text-gray-600">
            {{ .Date.Format "January 2, 2006" }} · {{ .Params.timeToRead }} min read
        </p>
    </header>
    <div class="prose prose-lg max-w-none">
        {{ .Content }}
    </div>
</article>
{{ end }}

baseURL: https://dylanbutler.dev/
theme: dbut.dev/x
title: "dbut2"
timeout: 2m
timezone: Australia/Melbourne
disableKinds:
  - taxonomy
  - term
params:
  name: Dylan Butler
  image: profile.png
  description: "software engineer in melbourne. i write some code, take some photos, and sometimes write about it too."
  socials:
    - name: github
      url: https://github.com/dbut2
    - name: linkedin
      url: https://linkedin.com/in/dbut2
    - name: email
      url: mailto:dylan@but.la
module:
  imports:
    - path: github.com/mfg92/hugo-shortcode-gallery
security:
  funcs:
    getenv:
      - ENV
markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      wrapStandAloneImageWithinParagraph: false
  highlight:
    style: monokai
    codeFences: true
    guessSyntax: false
    lineNos: false

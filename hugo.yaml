baseURL: https://dylanbutler.dev/
theme: dbut.dev/x
title: "dbut2"
timeout: 5m
timezone: Australia/Melbourne
disableKinds:
  - taxonomy
  - term
cascade:
  - build:
      publishResources: false
params:
  name: Dylan Butler
  image: profile.png
  description: "software engineer in melbourne. i write some code, take some photos, and sometimes write about it too."
  socials:
    - name: github
      url: https://github.com/dbut2
    - name: linkedin
      url: https://linkedin.com/in/dbut2
    - name: resume
      url: https://media.dylanbutler.dev/resume.pdf
    - name: email
      url: mailto:dylan@but.la
outputFormats:
  term:
    mediaType: text/plain
    baseName: index
    isPlainText: true
  manifest:
    mediaType: application/json
    baseName: manifest
    isPlainText: true
outputs:
  home:
    - html
    - rss
    - term
    - manifest
  section:
    - html
    - rss
    - term
  page:
    - html
    - term
security:
  funcs:
    getenv:
      - ENV
markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      wrapStandAloneImageWithinParagraph: false
  highlight:
    style: monokai
    codeFences: true
    guessSyntax: false
    lineNos: false
